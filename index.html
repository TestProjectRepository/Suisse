<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suisse</title>
    <link href="style.css" rel="stylesheet">
    <!-- Font -->
     <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

    <!-- Icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..24,400..700,1,200"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
</head>
<body>
    <!-- Nav Bar -->
     <div class="navBar">
        <!-- Left -->
        <div class="navLeft">
            <img src="src/cross.svg" class="navLogo" alt="Suisse Logo">
            <h2 class="navTitle">Suisse<span style="font-weight: 800;">Identité</span></h2>
        </div>

        <!-- Right -->
        <div class="navRight">
            <img src="src/menu.svg" class="navMenu">
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="mainContent">
            <img src="src/account.svg" class="accountImage">
            <h2 class="accountName" id="accountName"><span style="font-weight: 300">Bonjour,</span> Ethel Udry</h2>
        
            <div class="mainAction">
                <button class="mainButton">Nouveautés</button>
                <button class="mainButton">Mes documents</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
